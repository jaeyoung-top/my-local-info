name: Deploy and Update Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # 매일 한국시간 오전 9시 (UTC 00시)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and Generate
        run: |
          node scripts/fetch-public-data.js
          node scripts/fetch-ai-programs.js
          node scripts/crawl-songpa-news.js
          node scripts/generate-blog-post.js
          node scripts/fetch-hotdeals.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "변경 없음, 스킵" && exit 0
          git commit -m "자동 업데이트: 공공데이터 수집 및 블로그 글 생성"
          git pull --rebase origin main || (
            git status --porcelain | grep '^UU' | awk '{print $2}' | while read f; do
              git checkout --theirs "$f" && git add "$f"
            done
            git status --porcelain | grep '^AA' | awk '{print $2}' | while read f; do
              git checkout --theirs "$f" && git add "$f"
            done
            GIT_EDITOR=true git rebase --continue
          )
          git push

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=my-local-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
